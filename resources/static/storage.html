<html>
    <head>
        <title>Inspect Local Storage</title>
    </head>
    <body>
        <h1> Inspect Local Storage</h1>        
        <table border="1">
            <tr>
                <th><button onclick="localStorage.clear();window.location.reload();">clear all</button></th>
                <th>key</th>
                <th>value</th>
                <th></th>
            </tr>
            <script type="text/javascript">
            //<![CDATA[
                function delKey(li) {
                    var key = li.dataset.key;
                    localStorage.removeItem(key);
                    window.location.reload();
                }
                function setVal(li) {
                    var key = li.dataset.key;
                    m = prompt('set '+key+" to number?");
                    m = parseInt(m);
                    if (isNaN(m)) {
                        alert("The value has to be a number!");
                    } else {
                        localStorage.setItem(key,""+m);
                        window.location.reload();
                    }
                }
                function isCurrent(key) {
                    var base = key.replace(/(.*@).*/,"$1");
                    //alert("base["+base+"]");
                            
                    var count = localStorage.getItem(base+"count");
                    count = parseInt(""+count);
                    //alert("count["+count+"]");
                    if (isNaN(count))
                        return false;
                    
                    var max = localStorage.getItem(base+"max");
                    max = parseInt(""+max);
                    //alert("max["+max+"]");
                    if (isNaN(max))
                        return false;

                    iter = count % max;
                    //alert("iter["+iter+"]");
                    return key.endsWith("@"+iter+".out");
                }

                var keys = Object.keys(localStorage),
                    i = 0, key;

                for (; key = keys[i]; i++) {
                    document.write("<tr>");
                    document.write("<td><button onclick='delKey(this)' data-key='"+key+"'>del</button></td>");
                    document.write("<td>"+key+"</td>");
                    document.write("<td><pre>"+localStorage.getItem(key).substring(0,99)+"</pre></td>");
                    if (key.endsWith('.out')) {
                        document.write("<td>");
                        if (isCurrent(key))
                             document.write("<b>");
                        document.write("<a href='data:application/json;charset=utf-8,"+encodeURIComponent(localStorage.getItem(key))+"' download='"+key+".js'>download</a>");
                        if (isCurrent(key))
                             document.write("</b>");
                        document.write("</td>");
                    } else {
                        document.write("<td><button onclick='setVal(this)' data-key='"+key+"'>set</button></td>");
                    }
                    document.write("</tr>");
                }
            //]]>
            </script>
        </dl>
    </body>
</html>
